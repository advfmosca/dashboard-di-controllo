<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1c1c1e" />
<title>Bee Family — Andamento campagne</title>
<link rel="icon" type="image/png" href="https://10xproupload.s3.eu-west-1.amazonaws.com/it1495/custom/pagesImages/1736973291-Senza%20titolo%20%28500%20x%20200%20px%29.png" />
<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --bg-card: #ffffff;
    --border: #ececef;
    --border-soft: #f4f4f5;
    --text: #1c1c1e;
    --text-muted: #6b6b70;
    --text-dim: #8a8a90;
    --red: #d93025;
    --yellow: #f5a623;
    --green: #1e8e3e;
    --gray: #9a9aa0;
    --blue: #0866FF;
    --honey: #F4A93C;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.45;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 18px 20px 60px; }

  header.h { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; margin: 6px 0 22px; flex-wrap: wrap; }
  header.h .brand { max-width: 280px; width: 60%; height: auto; display: block; }
  header.h h1 { margin: 4px 0 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  header.h .sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .date-bar { display: flex; align-items: center; gap: 10px; margin: 0 0 14px; padding: 10px 14px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px; flex-wrap: wrap; }
  .date-bar label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .date-bar select { font: inherit; font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 1px solid #d2d2d7; background: #fff; color: var(--text); cursor: pointer; }
  .date-bar .frozen-tag { font-size: 11px; color: #8a5a00; font-weight: 600; padding: 3px 8px; background: #fff7eb; border-radius: 999px; }
  .date-bar .nav-spacer { flex: 1; }

  /* Platform filter chips */
  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-bar .lbl { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .filter-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px 5px 8px; border-radius: 999px; border: 1px solid #d2d2d7; background: #fff; color: var(--text); cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 500; transition: background .15s, border-color .15s; }
  .filter-chip:hover { background: var(--bg-soft); }
  .filter-chip.active { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
  .filter-chip.active .plogo.google { background: #fff; }
  .filter-chip .plogo { width: 18px; height: 18px; font-size: 11px; }

  /* Platform logos */
  .plogo { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; vertical-align: middle; }
  .plogo.meta { background: #0866FF; color: #fff; font-weight: 800; font-size: 13px; }
  .plogo.google { background: #fff; border: 1px solid #ececef; font-weight: 800; font-size: 12px; }
  .plogo svg { display: block; }

  /* KPI cards */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .kpi { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; min-width: 0; }
  .kpi .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
  .kpi .value { font-size: 24px; font-weight: 700; line-height: 1.1; color: #0f0f10; font-variant-numeric: tabular-nums; word-break: break-word; }
  .kpi .sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .kpi.total { background: #1c1c1e; border-color: #1c1c1e; }
  .kpi.total .label, .kpi.total .sub { color: #b8b8bf; }
  .kpi.total .value { color: #fff; }

  section.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
  section.card > h2 { margin: 0; padding: 11px 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-soft); background: var(--bg-soft); }
  section.card > h2 .pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; background: var(--border); color: #5a5a60; margin-left: auto; }
  .empty { color: var(--text-dim); font-style: italic; font-size: 13px; padding: 14px 16px; text-align: center; }

  .status-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border-soft); }
  .status-row:last-child { border-bottom: 0; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .status-dot.green { background: var(--green); }
  .status-dot.yellow { background: var(--yellow); }
  .status-dot.red { background: var(--red); }
  .status-dot.gray { background: var(--gray); }
  .status-row .body-row { flex: 1; min-width: 0; }
  .status-row .name { font-weight: 600; font-size: 13px; }
  .status-row .rat { color: #4a4a50; font-size: 12.5px; margin-top: 3px; line-height: 1.45; }

  .alert-row { padding: 10px 16px; border-bottom: 1px solid var(--border-soft); display: flex; gap: 10px; align-items: flex-start; font-size: 13px; }
  .alert-row:last-child { border-bottom: 0; }
  .alert-row .ico { font-size: 16px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
  .alert-row .body-row { flex: 1; min-width: 0; }
  .alert-row .title { font-weight: 600; }
  .alert-row .desc { color: var(--text-muted); font-size: 12.5px; margin-top: 2px; }

  .error { background: #fdf2f0; color: #b32f1f; border: 1px solid #fecaca; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin: 10px 0; }
  .muted { color: var(--text-dim); }
  .small { font-size: 11.5px; }

  .signature { font-size: 11.5px; color: var(--text-dim); margin-top: 28px; padding-top: 14px; border-top: 1px solid var(--border-soft); text-align: center; letter-spacing: 0.02em; }

  @media (max-width: 720px) {
    .wrap { padding: 14px 14px 50px; }
    header.h h1 { font-size: 20px; }
    .kpis { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .kpi { padding: 11px 12px; }
    .kpi .value { font-size: 20px; }
  }
  @media (max-width: 480px) {
    .kpi .value { font-size: 18px; }
    .filter-chip { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="h">
    <img class="brand" src="https://10xproupload.s3.eu-west-1.amazonaws.com/it1495/custom/pagesImages/1736973291-Senza%20titolo%20%28500%20x%20200%20px%29.png" alt="Bee Family" />
    <h1>Andamento campagne</h1>
    <div class="sub" id="hdr-sub">Caricamento dati…</div>
  </header>

  <div class="date-bar">
    <label for="date-select">Giorno:</label>
    <select id="date-select"><option>Caricamento…</option></select>
    <span id="frozen-tag" class="frozen-tag" style="display:none;">Vista bloccata su data specifica</span>
    <div class="nav-spacer"></div>
  </div>

  <div class="filter-bar" data-filter-scope="bf">
    <span class="lbl">Piattaforme:</span>
    <button type="button" class="filter-chip active" data-platform="all">Tutte</button>
    <button type="button" class="filter-chip active" data-platform="Meta"><span class="plogo meta">M</span> Meta</button>
    <button type="button" class="filter-chip active" data-platform="Google"><span class="plogo google">G</span> Google</button>
  </div>

  <div id="error-box"></div>

  <div class="kpis">
    <div class="kpi"><div class="label">Account attivi</div><div class="value" id="bf-k-acc">–</div><div class="sub" id="bf-k-acc-sub">/ totali</div></div>
    <div class="kpi total"><div class="label">Spending del giorno</div><div class="value" id="bf-k-spend">–</div></div>
    <div class="kpi"><div class="label">Contatti generati</div><div class="value" id="bf-k-contatti">–</div><div class="sub">Lead Ad + LP</div></div>
    <div class="kpi"><div class="label">CPC medio</div><div class="value" id="bf-k-cpc">–</div><div class="sub">€ / contatto</div></div>
  </div>

  <section class="card"><h2>Alert da analizzare <span class="pill" id="bf-alerts-pill">–</span></h2><div id="bf-alerts"></div></section>
  <section class="card"><h2>Status performance account <span class="pill" id="bf-status-pill">–</span></h2><div id="bf-status"></div></section>

  <div class="signature">© Francesco Maria Mosca 2026</div>
</div>

<script>
(function() {
  "use strict";

  function escapeHtml(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
  function fmtEUR(n) { if (n == null || isNaN(n)) return "—"; return Number(n).toLocaleString("it-IT", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €"; }

  function platformLogo(p) {
    if (p === "Meta") return `<span class="plogo meta" title="Meta">M</span>`;
    if (p === "Google") return `<span class="plogo google" title="Google"><svg viewBox="0 0 18 18" width="14" height="14"><path fill="#4285F4" d="M16.51 8.24c0-.57-.05-1.12-.15-1.65H9v3.13h4.21c-.18.97-.74 1.79-1.57 2.34v1.95h2.54c1.49-1.37 2.33-3.39 2.33-5.77z"/><path fill="#34A853" d="M9 17c2.13 0 3.91-.71 5.21-1.91l-2.54-1.95c-.7.47-1.6.75-2.67.75-2.05 0-3.79-1.39-4.41-3.25H2.04v2.05A8 8 0 0 0 9 17z"/><path fill="#FBBC05" d="M4.59 10.64A4.8 4.8 0 0 1 4.34 9c0-.57.1-1.12.25-1.64V5.31H2.04A8 8 0 0 0 1 9c0 1.29.31 2.51.86 3.59l2.73-1.95z"/><path fill="#EA4335" d="M9 4.16c1.16 0 2.2.4 3.02 1.18l2.26-2.26C12.91.94 11.13 0 9 0 5.84 0 3.16 1.85 2.04 4.56l2.55 1.99C5.21 4.69 6.95 4.16 9 4.16z"/></svg></span>`;
    return "";
  }

  let LAST_DATA = null;
  const FILTER = new Set(["Meta", "Google"]);

  function showError(msg) { document.getElementById("error-box").innerHTML = `<div class="error">${escapeHtml(msg)}</div>`; }
  function clearError() { document.getElementById("error-box").innerHTML = ""; }

  function render(d) {
    if (!d) return;
    LAST_DATA = d;
    clearError();
    document.getElementById("hdr-sub").textContent = "Periodo: " + (d.reference_date_label || d.reference_date || "—");

    const proj = d.beefamily;
    if (!proj) { showError("Dati BeeFamily non disponibili."); return; }
    const entries = (proj.entries || []).filter(e => FILTER.has(e.source));

    const actives = entries.filter(e => e.spend_y > 0).length;
    const total_spend = entries.reduce((s,e)=> s + (e.spend_y || 0), 0);
    const total_contatti = entries.reduce((s,e)=> s + (e.contatti_y || 0), 0);
    const cpc_y = total_contatti > 0 ? total_spend / total_contatti : null;
    document.getElementById("bf-k-acc").textContent = actives;
    document.getElementById("bf-k-acc-sub").textContent = "/ " + entries.length + " (con spesa > 0)";
    document.getElementById("bf-k-spend").textContent = fmtEUR(total_spend);
    document.getElementById("bf-k-contatti").textContent = total_contatti;
    document.getElementById("bf-k-cpc").textContent = cpc_y == null ? "—" : fmtEUR(cpc_y);

    // Alerts
    const alerts = entries.filter(e => e.status && (e.status.color === "red" || e.status.color === "yellow"));
    document.getElementById("bf-alerts-pill").textContent = alerts.length + " da analizzare";
    const alertsRoot = document.getElementById("bf-alerts");
    if (alerts.length === 0) alertsRoot.innerHTML = `<div class="empty">Nessun alert. Tutti gli account in linea ✓</div>`;
    else {
      let html = "";
      for (const a of alerts) {
        const ico = a.status.color === "red" ? "🔴" : "🟡";
        html += `<div class="alert-row">
          <div class="ico">${ico}</div>
          <div class="body-row">
            <div class="title">${platformLogo(a.source)} ${escapeHtml(a.name)} <span class="small muted">· ${escapeHtml(a.source)}</span></div>
            <div class="desc">${escapeHtml(a.status.label)} — ${escapeHtml(a.status.reason)}</div>
          </div>
        </div>`;
      }
      alertsRoot.innerHTML = html;
    }

    // Status
    document.getElementById("bf-status-pill").textContent = entries.length + " account";
    const statusRoot = document.getElementById("bf-status");
    if (entries.length === 0) statusRoot.innerHTML = `<div class="empty">Nessun dato disponibile per i filtri selezionati</div>`;
    else {
      let html = "";
      for (const e of entries) {
        const color = (e.status && e.status.color) || "gray";
        const label = (e.status && e.status.label) || "—";
        const reason = (e.status && e.status.reason) || "—";
        html += `<div class="status-row">
          <div class="status-dot ${color}"></div>
          <div class="body-row">
            <div class="name">${platformLogo(e.source)} ${escapeHtml(e.name)} <span class="small muted">· ${escapeHtml(e.source)}</span></div>
            <div class="rat">${escapeHtml(label)} — ${escapeHtml(reason)}</div>
          </div>
        </div>`;
      }
      statusRoot.innerHTML = html;
    }
  }

  // Filter chips
  document.querySelectorAll(".filter-bar .filter-chip").forEach(b => {
    b.addEventListener("click", () => {
      const plat = b.getAttribute("data-platform");
      const all = ["Meta", "Google"];
      if (plat === "all") {
        all.forEach(p => FILTER.add(p));
      } else {
        if (FILTER.has(plat)) {
          FILTER.delete(plat);
          if (FILTER.size === 0) all.forEach(p => FILTER.add(p));
        } else FILTER.add(plat);
      }
      // Sync UI
      const allActive = all.every(p => FILTER.has(p));
      document.querySelectorAll(".filter-bar .filter-chip").forEach(x => {
        const p2 = x.getAttribute("data-platform");
        if (p2 === "all") x.classList.toggle("active", allActive);
        else x.classList.toggle("active", FILTER.has(p2));
      });
      render(LAST_DATA);
    });
  });

  // Date param frozen mode
  const urlParams = new URLSearchParams(location.search);
  const frozenDate = urlParams.get("date");

  function fetchJson(url) {
    return fetch(url + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); });
  }

  function loadDate(date) {
    return fetchJson("snapshots/" + date + ".json")
      .then(render)
      .catch(err => fetchJson("data.json").then(render).catch(() => {
        showError("Impossibile caricare lo snapshot del " + date + ". La scheduled task delle 08:30 aggiorna ogni mattina.");
      }));
  }

  const dateSelect = document.getElementById("date-select");
  const frozenTag = document.getElementById("frozen-tag");

  if (frozenDate) {
    // Modalità "link condiviso" — bloccata su uno specifico giorno
    dateSelect.innerHTML = `<option value="${frozenDate}">${frozenDate}</option>`;
    dateSelect.value = frozenDate;
    dateSelect.disabled = true;
    frozenTag.style.display = "inline-block";
    loadDate(frozenDate);
  } else {
    // Modalità "live" — sempre l'ultimo snapshot, ma il selettore mostra l'intero archivio
    fetchJson("snapshots/index.json").then(idx => {
      const dates = (idx.dates || []).slice(0, 90);
      if (dates.length === 0) throw new Error("nessuno snapshot");
      dateSelect.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join("");
      dateSelect.value = dates[0];
      dateSelect.addEventListener("change", () => loadDate(dateSelect.value));
      return loadDate(dates[0]);
    }).catch(() => {
      dateSelect.innerHTML = `<option>—</option>`;
      fetchJson("data.json").then(render).catch(() => showError("Nessun dato disponibile."));
    });
  }
})();
</script>
</body>
</html>
